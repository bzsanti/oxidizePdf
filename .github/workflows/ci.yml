name: CI

on:
  push:
    branches: [ main, develop, develop_santi ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.rust == 'beta' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable]
        # beta temporarily disabled - needs API updates for benchmarks
    steps:
      - uses: actions/checkout@v5
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Install Tesseract OCR (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr libtesseract-dev

      - name: Install Tesseract OCR (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install tesseract

      - name: Install Tesseract OCR (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install tesseract
          echo "C:\Program Files\Tesseract-OCR" >> $env:GITHUB_PATH

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check for backup files
        if: matrix.os != 'windows-latest'
        run: |
          if find . -name "*.backup" -o -name "*_old.rs" | grep .; then
            echo "ERROR: Backup files found in repository"
            exit 1
          fi

      - name: Check for backup files (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $backups = Get-ChildItem -Recurse -Include "*.backup","*_old.rs" -ErrorAction SilentlyContinue
          if ($backups) {
            Write-Error "ERROR: Backup files found in repository"
            exit 1
          }

      - name: Run clippy
        run: cargo clippy --all -- -D warnings

      - name: Build
        run: cargo build --all --verbose

      - name: Run tests (macOS beta - lib only)
        if: matrix.os == 'macos-latest' && matrix.rust == 'beta'
        run: cargo test --lib --verbose

      - name: Run tests (all others)
        if: matrix.os != 'macos-latest' || matrix.rust != 'beta'
        run: cargo test --all --features internal-testing --verbose

      # The analysis SPI is gated behind `unstable-spi` (+ `semantic` for the
      # enricher/extra bag), so the default test step above never compiles its
      # tests. Exercise the SPI feature matrix on Linux/stable (spec §10.6).
      - name: Run analysis SPI tests (unstable-spi)
        if: matrix.os == 'ubuntu-latest' && matrix.rust == 'stable'
        run: cargo test -p oxidize-pdf --features "internal-testing,unstable-spi" --verbose

      - name: Run analysis SPI tests (unstable-spi + semantic)
        if: matrix.os == 'ubuntu-latest' && matrix.rust == 'stable'
        run: cargo test -p oxidize-pdf --features "internal-testing,unstable-spi,semantic" --verbose

      - name: Build documentation
        run: cargo doc --all --no-deps

  examples:
    name: Examples compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # The `test` job runs `cargo build --all`, which builds workspace
      # packages' default targets only — examples are NOT default targets, so a
      # broken or removed-API example is invisible to CI without this job. The
      # script's compile gate (`cargo check --examples --all-features`) closes
      # that gap. The output gate (`--run`) is skipped here: it needs the corpus
      # cache, which requires network the CI runner does not use.
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install Tesseract OCR
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr libtesseract-dev

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-examples-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Verify examples compile
        run: ./scripts/verify-examples.sh

  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Pin the declared MSRV. This job is the gate that catches dependency
      # drift past the MSRV (the lack of which let edition-2024 deps silently
      # break the previously-declared 1.77). `--locked` fails if the committed
      # Cargo.lock resolves to versions incompatible with 1.88.
      - name: Install Rust 1.88 (MSRV)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-msrv-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      # Build only — rusty-tesseract (ocr-tesseract) shells out to the tesseract
      # binary at runtime via subprocess, so the C library is not needed to compile.
      - name: Build library on MSRV (all features, locked)
        run: cargo build --lib --all-features --locked
